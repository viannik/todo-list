{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <div class="card p-4 shadow-sm">
      <h1 class="mb-3">Delete tag?</h1>
      <p class="text-muted">Are you sure you want to delete this tag: <strong>{{ object.content }}</strong>?</p>

      <form action="" method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-end mt-3">
          <a onclick="window.history.back()" class="btn btn-secondary me-2">Cancel</a>
          <button type="submit" class="btn btn-danger">Yes, delete</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
