{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1>Tag list</h1>
      <a href="{% url 'tasks:tag-create' %}" class="btn btn-primary">Add tag</a>
    </div>

    <table class="table table-bordered table-hover">
      <thead class="thead-light">
      <tr>
        <th scope="col">Tag name</th>
        <th scope="col">Actions</th>
      </tr>
      </thead>
      <tbody>
      {% for tag in tags %}
        <tr>
          <td>{{ tag.name }}</td>
          <td>
            <a href="{% url 'tasks:tag-update' tag.id %}" class="btn btn-sm btn-outline-secondary">Update</a>
            <a href="{% url 'tasks:tag-delete' tag.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3" class="text-center">No tags available.</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
